name: CI (api)

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - ".github/workflows/ci-api.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/api/**"
      - ".github/workflows/ci-api.yml"

concurrency:
  group: ci-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: tms
          POSTGRES_PASSWORD: tms
          POSTGRES_DB: tms
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tms"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://tms:tms@localhost:5432/tms?schema=public
      JWT_SECRET: ci-test-secret-not-for-production
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: apps/api/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint:ci

      - name: Build
        run: pnpm run build

      - name: Unit tests
        run: pnpm test

      - name: E2E tests
        run: pnpm run test:e2e
